<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineView — 小林绿子的片单</title>
<style>
:root {
  --bg: #000;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.1);
  --text: #f5f5f7;
  --text-secondary: #a1a1a6;
  --text-tertiary: #6e6e73;
  --accent: #ff9f0a;
  --accent-dim: rgba(255,159,10,0.15);
  --star: #ff9f0a;
  --radius: 16px;
  --nav-height: 52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration:none}
img{display:block;max-width:100%}

/* Nav */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:var(--nav-height);
  background:rgba(0,0,0,0.6);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:background 0.4s;
}
.nav.scrolled{background:rgba(0,0,0,0.85)}
.nav-inner{
  max-width:1400px;margin:0 auto;height:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
.nav-logo{font-size:1.25rem;font-weight:700;color:var(--text);letter-spacing:-0.01em}
.nav-logo span{opacity:0.5;font-weight:400;font-size:0.82rem;margin-left:8px}
.nav-links{display:flex;gap:8px;list-style:none}
.nav-links a{
  color:var(--text-secondary);font-size:0.82rem;font-weight:500;
  padding:8px 14px;border-radius:20px;
  transition:all 0.25s;
}
.nav-links a:hover,.nav-links a.active{color:#333;background:var(--accent)}

/* Hero */
.hero{
  position:relative;overflow:hidden;
  padding:160px 24px 80px;
  text-align:center;
}
.hero-grid{
  position:absolute;inset:0;
  display:grid;grid-template-columns:repeat(8,1fr);
  gap:4px;opacity:0.12;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,0.6) 0%,rgba(0,0,0,0.4) 50%,rgba(0,0,0,0) 100%);
  -webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,0.6) 0%,rgba(0,0,0,0.4) 50%,rgba(0,0,0,0) 100%);
}
.hero-grid img{width:100%;aspect-ratio:2/3;object-fit:cover}
.hero-content{position:relative;z-index:1}
.hero-badge{
  display:inline-block;font-size:0.75rem;color:var(--text-secondary);
  background:var(--surface);border:1px solid var(--glass-border);
  border-radius:20px;padding:6px 16px;margin-bottom:20px;
  letter-spacing:0.04em;
}
.hero h1{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:700;letter-spacing:-0.03em}
.hero h1 span{color:var(--accent)}
.hero-subtitle{font-size:1.1rem;color:var(--text-secondary);margin-top:12px;font-weight:400}
.hero-stats{display:flex;gap:24px;justify-content:center;margin-top:40px;flex-wrap:wrap}
.hero-stat{
  text-align:center;padding:16px 24px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);
}
.hero-stat-num{font-size:1.6rem;font-weight:700;color:var(--accent)}
.hero-stat-label{font-size:0.72rem;color:var(--text-tertiary);margin-top:4px}

/* Controls */
.controls{
  position:sticky;top:var(--nav-height);z-index:100;
  background:rgba(0,0,0,0.55);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:12px 0;
}
.controls-inner{
  max-width:1400px;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.search-box{
  position:relative;flex:1;min-width:180px;max-width:320px;
}
.search-box input{
  width:100%;padding:8px 12px 8px 34px;border-radius:20px;
  border:1px solid var(--glass-border);background:var(--surface);
  color:var(--text);font-size:0.85rem;font-family:inherit;
  outline:none;transition:all 0.25s;
}
.search-box input:focus{border-color:var(--accent);background:var(--surface-hover)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:0.8rem}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.filter-pill{
  padding:5px 14px;border-radius:16px;
  border:1px solid var(--glass-border);background:var(--surface);
  color:var(--text-secondary);font-size:0.75rem;cursor:pointer;
  transition:all 0.2s ease;font-family:inherit;white-space:nowrap;
}
.filter-pill:hover{background:var(--surface-hover);color:var(--text)}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.sort-select{
  padding:8px 12px;border-radius:16px;
  border:1px solid var(--glass-border);background:var(--surface);
  color:var(--text);font-size:0.82rem;font-family:inherit;
  outline:none;cursor:pointer;
}
.result-count{font-size:0.75rem;color:var(--text-tertiary);white-space:nowrap}

/* Filter bars (genre + country) */
.filter-bar{
  padding:8px 24px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.filter-bar-inner{
  max-width:1400px;margin:0 auto;
  display:flex;gap:10px;align-items:center;
}
.filter-bar-label{
  font-size:0.72rem;color:var(--text-tertiary);
  font-weight:600;white-space:nowrap;
  min-width:28px;
}
.filter-bar .filter-pills{display:flex;gap:5px;flex-wrap:wrap}
.filter-bar .filter-pill{
  padding:5px 12px;border-radius:16px;
  border:1px solid var(--glass-border);background:var(--surface);
  color:var(--text-secondary);font-size:0.72rem;cursor:pointer;
  transition:all 0.2s ease;font-family:inherit;white-space:nowrap;
}
.filter-bar .filter-pill:hover{background:var(--surface-hover);color:var(--text)}
.filter-bar .filter-pill.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.filter-bar .filter-pill .pill-count{font-size:0.62rem;opacity:0.65;margin-left:3px}

/* Movie Grid */
.section{padding:40px 24px}
.grid{
  max-width:1400px;margin:0 auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}
.card{
  position:relative;overflow:hidden;
  border-radius:var(--radius);
  background:var(--surface);
  border:1px solid var(--glass-border);
  cursor:pointer;
  transition:all 0.35s cubic-bezier(0.25,0.1,0.25,1);
  aspect-ratio:2/3;
  animation:fadeUp 0.6s ease both;
}
.card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,0.5);border-color:rgba(255,255,255,0.15)}
.card:hover .card-poster{transform:scale(1.06)}
.card-poster{
  width:100%;height:100%;object-fit:cover;
  transition:transform 0.5s cubic-bezier(0.25,0.1,0.25,1);
}
.card-badge{
  position:absolute;top:10px;right:10px;
  font-size:0.75rem;padding:4px 8px;
  background:rgba(0,0,0,0.6);border-radius:10px;
  color:var(--star);font-weight:600;
}
.card-overlay{
  position:absolute;bottom:0;left:0;right:0;
  padding:40px 14px 14px;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));
}
.card-title-cn{font-size:0.85rem;font-weight:600;color:var(--text);line-height:1.3}
.card-title-orig{font-size:0.7rem;color:var(--text-tertiary);margin-top:2px}
.card-meta{display:flex;gap:8px;align-items:center;margin-top:6px}
.card-year{font-size:0.7rem;color:var(--text-secondary)}
.card-rating{font-size:0.72rem}
.star{color:var(--star)}.star.empty{opacity:0.2}

/* Footer */
.footer{padding:40px 24px;text-align:center}
.footer p{font-size:0.75rem;color:var(--text-tertiary)}

/* Empty state */
.empty{text-align:center;padding:80px 24px}
.empty-icon{font-size:3rem;margin-bottom:16px}
.empty p{color:var(--text-tertiary);font-size:0.95rem}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* Responsive */
@media (max-width:768px){
  .nav-links{display:none}
  .hero{padding:120px 20px 60px}
  .hero-stats{gap:12px}
  .hero-stat{padding:12px 16px}
  .hero-stat-num{font-size:1.3rem}
  .controls-inner{flex-direction:column;align-items:stretch;gap:8px}
  .search-box{max-width:none}
  .filter-pills{justify-content:center}
  .sort-select{align-self:center}
  .result-count{text-align:center}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .filter-bar-inner{flex-direction:column;align-items:flex-start;gap:8px}
  .filter-bar-label{min-width:auto}
  .filter-bar .filter-pill{padding:6px 12px;font-size:0.75rem;min-height:36px;display:inline-flex;align-items:center}
  .section{padding:24px 16px}
}
@media (max-width:480px){
  .hero h1{font-size:2rem}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .filter-bar{padding:8px 12px}
  .filter-bar .filter-pills{gap:4px}
}
@media (prefers-reduced-motion:reduce){
  .card{animation:none}
  .card:hover{transform:none}
  .card:hover .card-poster{transform:none}
}
</style>
</head>

(function(){
var currentFilter='all',currentSort='default';
var selectedGenres=[],selectedCountries=[];

// Hero grid - random poster samples
var hg=document.getElementById('heroGrid');
var samples=MOVIES.slice().sort(function(){return Math.random()-0.5}).slice(0,48);
samples.forEach(function(m){
  var img=document.createElement('img');img.src=m.poster;img.loading='lazy';
  img.onerror=function(){this.remove()};hg.appendChild(img);
});

// Stats
var years=MOVIES.map(function(m){return m.year}).filter(function(y){return y>0});
var avgRating=(MOVIES.reduce(function(s,m){return s+m.rating},0)/MOVIES.length).toFixed(1);
var minYear=Math.min.apply(null,years),maxYear=Math.max.apply(null,years);
var dc={};MOVIES.forEach(function(m){if(m.year){var d=Math.floor(m.year/10)*10;dc[d]=(dc[d]||0)+1}});
var td=Object.entries(dc).sort(function(a,b){return b[1]-a[1]})[0];
document.getElementById('heroStats').innerHTML=
  '<div class="hero-stat"><div class="hero-stat-num">'+MOVIES.length+'</div><div class="hero-stat-label">部电影</div></div>'+
  '<div class="hero-stat"><div class="hero-stat-num">'+avgRating+'</div><div class="hero-stat-label">平均评分 / 5</div></div>'+
  '<div class="hero-stat"><div class="hero-stat-num">'+minYear+'–'+maxYear+'</div><div class="hero-stat-label">年份跨度</div></div>'+
  '<div class="hero-stat"><div class="hero-stat-num">'+(td?td[0]+'s':'—')+'</div><div class="hero-stat-label">最多产的年代</div></div>';

// Decade filter pills
var decades=Object.keys(dc).map(Number).sort(function(a,b){return b-a});
var fp=document.getElementById('filterPills');
var ph='<button class="filter-pill active" data-filter="all">全部</button>';
decades.forEach(function(d){ph+='<button class="filter-pill" data-filter="'+d+'">'+d+'s</button>'});
var hr5=MOVIES.filter(function(m){return m.rating>=5}).length;
ph+='<button class="filter-pill" data-filter="rated-5">⭐ 五星 ('+hr5+')</button>';
fp.innerHTML=ph;

// ── Genre & Country data ──────────────────────────────────
var genreMap={},countryMap={};
MOVIES.forEach(function(m){
  (m.genres||[]).forEach(function(g){genreMap[g]=(genreMap[g]||0)+1});
  (m.countries||[]).forEach(function(c){countryMap[c]=(countryMap[c]||0)+1});
});
var allGenres=Object.keys(genreMap).sort(function(a,b){return genreMap[b]-genreMap[a]});
var allCountries=Object.keys(countryMap).sort(function(a,b){return countryMap[b]-countryMap[a]});

function renderFilterPills(availableMovies,type){
  var containerId=type==='genre'?'genrePills':'countryPills';
  var allItems=type==='genre'?allGenres:allCountries;
  var selectedArr=type==='genre'?selectedGenres:selectedCountries;

  // Recalculate counts from available movie set
  var availableCounts={};
  allItems.forEach(function(item){availableCounts[item]=0});
  availableMovies.forEach(function(m){
    var items=type==='genre'?(m.genres||[]):(m.countries||[]);
    items.forEach(function(item){
      if(availableCounts[item]!==undefined)availableCounts[item]++;
    });
  });

  var html='';
  allItems.forEach(function(item){
    var count=availableCounts[item];
    if(count>0){
      var activeClass=selectedArr.indexOf(item)!==-1?' active':'';
      html+='<button class="filter-pill'+activeClass+'" data-'+type+'="'+item+'">'+item+'<span class="pill-count">'+count+'</span></button>';
    }
  });
  document.getElementById(containerId).innerHTML=html;
}

function stars(r){var s='';for(var i=0;i<5;i++)s+='<span class="star'+(i>=r?' empty':'')+'">★</span>';return s}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;')}

function cardHTML(m,i){
  var url='https://movie.douban.com/subject/'+m.id+'/';
  return '<div class="card" style="animation-delay:'+(i%30)*0.02+'s" onclick="window.open(\x27'+url+'\x27,\x27_blank\x27)">'+
    '<img class="card-poster" src="'+m.poster+'" alt="'+esc(m.title_cn)+'" loading="lazy">'+
    '<div class="card-badge">'+(m.rating>0?'⭐'+m.rating:'')+'</div>'+
    '<div class="card-overlay">'+
      '<div class="card-title-cn">'+esc(m.title_cn)+'</div>'+
      '<div class="card-title-orig">'+esc(m.title_orig)+'</div>'+
      '<div class="card-meta"><span class="card-year">'+(m.year||'—')+'</span><span class="card-rating">'+stars(m.rating)+'</span></div>'+
    '</div></div>';
}

function render(movies){
  var g=document.getElementById('movieGrid'),e=document.getElementById('empty'),c=document.getElementById('resultCount');
  if(!movies.length){g.innerHTML='';e.style.display='block';c.textContent='0 部';return}
  e.style.display='none';c.textContent=movies.length+' 部';
  g.innerHTML=movies.map(function(m,i){return cardHTML(m,i)}).join('');
}

function applyFilters(){
  var ms=[].concat(MOVIES);

  // Decade/rating filter
  if(currentFilter==='rated-5')ms=ms.filter(function(m){return m.rating>=5});
  else if(currentFilter!=='all'){var d=parseInt(currentFilter);ms=ms.filter(function(m){return m.year>=d&&m.year<d+10})}

  // Text search
  var q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(q)ms=ms.filter(function(m){return m.title_cn.toLowerCase().indexOf(q)!==-1||m.title_orig.toLowerCase().indexOf(q)!==-1});

  // Genre filter: AND logic
  if(selectedGenres.length>0){
    ms=ms.filter(function(m){
      var mg=m.genres||[];
      return selectedGenres.every(function(g){return mg.indexOf(g)!==-1});
    });
  }

  // Country filter: OR logic
  if(selectedCountries.length>0){
    ms=ms.filter(function(m){
      var mc=m.countries||[];
      return selectedCountries.some(function(c){return mc.indexOf(c)!==-1});
    });
  }

  // Sort
  switch(currentSort){
    case'year-desc':ms.sort(function(a,b){return b.year-a.year});break;
    case'year-asc':ms.sort(function(a,b){return a.year-b.year});break;
    case'rating-desc':ms.sort(function(a,b){return b.rating-a.rating||b.year-a.year});break;
    case'rating-asc':ms.sort(function(a,b){return a.rating-b.rating||b.year-a.year});break;
    case'title':ms.sort(function(a,b){return a.title_cn.localeCompare(b.title_cn,'zh')});break;
  }

  // Update genre/country pill counts
  renderFilterPills(ms,'genre');
  renderFilterPills(ms,'country');

  render(ms);
}

// Event listeners
document.getElementById('searchInput').addEventListener('input',applyFilters);
fp.addEventListener('click',function(e){
  var p=e.target.closest('.filter-pill');if(!p)return;
  document.querySelectorAll('#filterPills .filter-pill').forEach(function(x){x.classList.remove('active')});
  p.classList.add('active');currentFilter=p.dataset.filter;applyFilters();
});
document.getElementById('sortSelect').addEventListener('change',function(e){currentSort=e.target.value;applyFilters()});

// Genre pill click: multi-select toggle
document.getElementById('genrePills').addEventListener('click',function(e){
  var p=e.target.closest('.filter-pill');if(!p)return;
  var genre=p.dataset.genre;
  var idx=selectedGenres.indexOf(genre);
  if(idx===-1)selectedGenres.push(genre);else selectedGenres.splice(idx,1);
  applyFilters();
});

// Country pill click: multi-select toggle
document.getElementById('countryPills').addEventListener('click',function(e){
  var p=e.target.closest('.filter-pill');if(!p)return;
  var country=p.dataset.country;
  var idx=selectedCountries.indexOf(country);
  if(idx===-1)selectedCountries.push(country);else selectedCountries.splice(idx,1);
  applyFilters();
});

// Nav scroll effect
var nav=document.getElementById('nav'),ticking=false;
window.addEventListener('scroll',function(){
  if(!ticking){requestAnimationFrame(function(){nav.classList.toggle('scrolled',window.scrollY>50);ticking=false});ticking=true}
});

// Initial render
renderFilterPills(MOVIES,'genre');
renderFilterPills(MOVIES,'country');
render(MOVIES);
window.scrollToTop=function(){window.scrollTo({top:0,behavior:'smooth'})};
})();
</script>

</body></html>
